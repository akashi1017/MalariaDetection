<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaria Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 1.7rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Model status badge */
        .status-badge {
            text-align: center;
            margin-bottom: 25px;
        }
        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .badge.ok  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .badge.err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Upload area */
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .upload-area:hover { border-color: #667eea; background: #f0f2ff; }
        .upload-area.dragover { border-color: #667eea; background: #e8ecff; }

        .upload-icon { font-size: 3rem; margin-bottom: 10px; }
        .upload-area p { color: #666; margin: 5px 0; }
        .upload-area .hint { font-size: 0.8rem; color: #aaa; }

        #file-input { display: none; }

        /* Preview */
        #preview-section { display: none; margin-bottom: 20px; text-align: center; }
        #preview-img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
            border: 2px solid #eee;
        }
        #file-name { font-size: 0.85rem; color: #666; margin-top: 8px; }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover   { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Result box */
        #result-section { display: none; margin-top: 25px; }

        .result-box {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .result-box.parasitized { background: #fff0f0; border: 2px solid #ffcccc; }
        .result-box.uninfected  { background: #f0fff4; border: 2px solid #b2f2c8; }

        .result-label {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .result-box.parasitized .result-label { color: #c0392b; }
        .result-box.uninfected  .result-label { color: #27ae60; }

        .result-icon  { font-size: 2.5rem; margin-bottom: 8px; }
        .confidence   { font-size: 1rem; color: #555; margin-bottom: 14px; }

        /* Probability bars */
        .prob-row { margin: 6px 0; text-align: left; }
        .prob-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: #555;
            margin-bottom: 3px;
        }
        .prob-bar-bg {
            background: #eee;
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
        }
        .prob-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s ease;
        }
        .bar-red   { background: #e74c3c; }
        .bar-green { background: #2ecc71; }

        .timestamp { font-size: 0.75rem; color: #aaa; margin-top: 12px; }

        /* Reset button */
        .btn-reset {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset:hover { background: #f0f2ff; }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">

    <h1>🔬 Malaria Detection</h1>
    <p class="subtitle">Upload a blood smear image to detect malaria infection</p>

    <!-- Model status -->
    <div class="status-badge">
        {% if model_loaded %}
            <span class="badge ok">✅ Model Ready</span>
        {% else %}
            <span class="badge err">❌ Model Not Loaded — {{ error }}</span>
        {% endif %}
    </div>

    <!-- Upload area -->
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📁</div>
        <p><strong>Click to upload</strong> or drag & drop</p>
        <p class="hint">PNG, JPG, JPEG supported</p>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <!-- Image preview -->
    <div id="preview-section">
        <img id="preview-img" src="" alt="Preview">
        <p id="file-name"></p>
    </div>

    <!-- Predict button -->
    <button class="btn" id="predict-btn" onclick="predict()" disabled>
        Analyse Image
    </button>

    <!-- Result -->
    <div id="result-section">
        <div class="result-box" id="result-box">
            <div class="result-icon" id="result-icon"></div>
            <div class="result-label" id="result-label"></div>
            <div class="confidence"  id="confidence-text"></div>

            <div class="prob-row">
                <div class="prob-label">
                    <span>🔴 Parasitized</span>
                    <span id="para-pct"></span>
                </div>
                <div class="prob-bar-bg">
                    <div class="prob-bar-fill bar-red" id="para-bar" style="width:0%"></div>
                </div>
            </div>

            <div class="prob-row">
                <div class="prob-label">
                    <span>🟢 Uninfected</span>
                    <span id="uninf-pct"></span>
                </div>
                <div class="prob-bar-bg">
                    <div class="prob-bar-fill bar-green" id="uninf-bar" style="width:0%"></div>
                </div>
            </div>

            <div class="timestamp" id="timestamp"></div>
        </div>

        <button class="btn-reset" onclick="reset()">🔄 Analyse Another Image</button>
    </div>

</div>

<script>
    let selectedFile = null;

    // File input change
    document.getElementById('file-input').addEventListener('change', function(e) {
        handleFile(e.target.files[0]);
    });

    // Drag and drop
    const uploadArea = document.getElementById('upload-area');
    uploadArea.addEventListener('dragover',  (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', ()  => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop',      (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
        if (!file) return;
        selectedFile = file;

        // Show preview
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('preview-section').style.display = 'block';
            document.getElementById('result-section').style.display  = 'none';
        };
        reader.readAsDataURL(file);

        document.getElementById('predict-btn').disabled = false;
    }

    async function predict() {
        if (!selectedFile) return;

        const btn = document.getElementById('predict-btn');
        btn.disabled   = true;
        btn.innerHTML  = '<span class="spinner"></span> Analysing...';

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data     = await response.json();

            if (data.success) {
                showResult(data);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (err) {
            alert('Request failed: ' + err);
        }

        btn.disabled  = false;
        btn.innerHTML = 'Analyse Image';
    }

    function showResult(data) {
        const isParasitized = data.prediction === 'Parasitized';
        const box           = document.getElementById('result-box');

        box.className = 'result-box ' + (isParasitized ? 'parasitized' : 'uninfected');

        document.getElementById('result-icon').textContent      = isParasitized ? '🔴' : '🟢';
        document.getElementById('result-label').textContent     = data.prediction;
        document.getElementById('confidence-text').textContent  = `Confidence: ${data.confidence}%`;
        document.getElementById('para-pct').textContent         = data.parasitized_probability + '%';
        document.getElementById('uninf-pct').textContent        = data.uninfected_probability  + '%';
        document.getElementById('para-bar').style.width         = data.parasitized_probability + '%';
        document.getElementById('uninf-bar').style.width        = data.uninfected_probability  + '%';
        document.getElementById('timestamp').textContent        = '🕐 ' + data.timestamp;

        document.getElementById('result-section').style.display = 'block';
    }

    function reset() {
        selectedFile = null;
        document.getElementById('file-input').value            = '';
        document.getElementById('preview-section').style.display = 'none';
        document.getElementById('result-section').style.display  = 'none';
        document.getElementById('predict-btn').disabled          = true;
    }
</script>
</body>
</html>
